name: todo_app
description: Production-grade cross-platform Todo app for Android and Web.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  drift_flutter: ^0.2.1
  path_provider: ^2.1.3
  path: ^1.9.0
  google_sign_in: ^6.2.1
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4
  shared_preferences: ^2.3.1
  intl: ^0.19.0
  uuid: ^4.4.0
  get_it: ^7.7.0
  injectable: ^2.4.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3
  injectable_generator: ^2.4.2
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
